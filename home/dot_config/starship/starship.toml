# Starship prompt — onedark pastel palette, expressive but calm.
"$schema" = 'https://starship.rs/config-schema.json'

# ─── Layout ─────────────────────────────────────────────────────────────────
# Line 1:   os dir  on branch [status]  lang  docker  k8s  ────────  time
# Line 2:   duration
# Line 3:   ❯

format = """
$os\
$directory\
$git_branch\
$git_status\
$git_state\
$nodejs\
$python\
$golang\
$rust\
$java\
$custom\
$kubernetes\
$fill\
$cmd_duration\
$time\
$line_break\
$jobs\
$battery\
$character"""

add_newline = true

# ─── Palette (onedark) ──────────────────────────────────────────────────────
# Defined inline below. Chosen hex values:
#  green   #98c379   red    #e06c75   yellow #e5c07b
#  blue    #61afef   cyan   #56b6c2   purple #c678dd
#  orange #d19a66   gray   #5c6370   bg-gray #3e4452
# ────────────────────────────────────────────────────────────────────────────

[os]
disabled = false
style    = "bold #c678dd"
[os.symbols]
Macos = " "
Linux = " "

[character]
success_symbol = "[❯](bold #98c379)"
error_symbol   = "[❯](bold #e06c75)"
vimcmd_symbol  = "[❮](bold #98c379)"

[directory]
style             = "bold #c678dd"
truncation_length = 4
truncate_to_repo  = true
read_only         = " "
read_only_style   = "bold #e06c75"
home_symbol       = "~"
format            = "[$path]($style)[$read_only]($read_only_style) "
[directory.substitutions]
"Documents" = "󰈙 Docs"
"Downloads" = " DL"
"Music"     = " Music"
"Pictures"  = " Pics"

[fill]
symbol = " "
style  = "#3e4452"

# ─── Git ────────────────────────────────────────────────────────────────────

[git_branch]
symbol = " "
style  = "fg:#e06c75"
format = "on [$symbol$branch]($style) "

[git_commit]
commit_hash_length = 7
style              = "bold #e5c07b"
tag_symbol         = "  "

[git_state]
style  = "bold #c678dd"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[git_status]
format         = '([\[$all_status$ahead_behind\]]($style) )'
style          = "bold #e5c07b"
conflicted     = "[=${count}](fg:#e06c75 bold) "
ahead          = "[⇡${count}](fg:#98c379 bold) "
behind         = "[⇣${count}](fg:#e5c07b bold) "
diverged       = "[⇕⇡${ahead_count}⇣${behind_count}](fg:#e06c75 bold) "
up_to_date     = ""
untracked      = "[?${count}](fg:#61afef bold) "
stashed        = "[\\$${count}](fg:#56b6c2 bold) "
modified       = "[!${count}](fg:#e5c07b bold) "
staged         = "[+${count}](fg:#98c379 bold) "
renamed        = "[»${count}](fg:#c678dd bold) "
deleted        = "[✘${count}](fg:#e06c75 bold) "

# ─── Right-hand side ────────────────────────────────────────────────────────

[cmd_duration]
min_time          = 2000
format            = "took [ $duration](fg:#5c6370 bold)  "
show_milliseconds = false

[time]
disabled    = false
time_format = "%R"
format      = "[ $time](fg:#5c6370)"

[jobs]
symbol   = "✦ "
style    = "bold #61afef"
format   = "[$symbol$number]($style) "
number_threshold = 1

[battery]
full_symbol        = "🔋"
charging_symbol    = "🔌"
discharging_symbol = "⚡"
[[battery.display]]
threshold = 20
style     = "bold #e06c75"
[[battery.display]]
threshold = 50
style     = "bold #e5c07b"

# ─── Languages (emoji — portable across fonts) ──────────────────────────────

[nodejs]
symbol         = "⬢ "
format         = "via [$symbol$version]($style) "
style          = "bold #98c379"
detect_files   = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[python]
symbol = "🐍 "
format = "via [$symbol$version( \\($virtualenv\\))]($style) "
style  = "bold #e5c07b"

[golang]
symbol = "🐹 "
format = "via [$symbol$version]($style) "
style  = "bold #56b6c2"

[rust]
symbol = "🦀 "
format = "via [$symbol$version]($style) "
style  = "bold #d19a66"

[java]
symbol = "☕ "
format = "via [$symbol$version]($style) "
style  = "bold #61afef"

[kubernetes]
disabled       = false
symbol         = "☸ "
format         = "on [$symbol$context( \\($namespace\\))]($style) "
style          = "bold #c678dd"
detect_files   = ["kustomization.yml", "kustomization.yaml", "Chart.yaml"]
detect_folders = [".kube"]

# ─── Custom: docker-presence (built-in docker_context needs daemon + CWD only)
[custom.docker]
description  = "Docker emoji when a Dockerfile or compose file is in the current directory"
symbol       = "🐳"
detect_files = [
  "Dockerfile",
  "docker-compose.yml",
  "docker-compose.yaml",
  "compose.yml",
  "compose.yaml",
  "Dockerfile.dev",
]
command      = "echo"
format       = "[$symbol ](bold #61afef) "

# ─── Disabled: noisy modules ────────────────────────────────────────────────
[package]
disabled = true

[dotnet]
disabled = true

[nix_shell]
disabled = true

[ruby]
disabled = true

[php]
disabled = true

[perl]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[lua]
disabled = true

[conda]
disabled = true

[pulumi]
disabled = true

[terraform]
disabled = true

# Replaced by [custom.docker] above
[docker_context]
disabled = true
