# Starship — onedark pastel palette
"$schema" = 'https://starship.rs/config-schema.json'

# Left prompt: dir  on branch [status]  via lang  (duration)
#              ❯
format = """
$directory\
$git_branch\
$git_status\
$git_state\
$nodejs\
$python\
$golang\
$rust\
$java\
$docker_context\
$kubernetes\
$cmd_duration\
$line_break\
$character"""

right_format = "$time"
add_newline = true

# ─── Palette (onedark) ──────────────────────────────────────────────────────
#  green   #98c379   red    #e06c75   yellow #e5c07b
#  blue    #61afef   cyan   #86BBD8   purple #c678dd
#  gray    #5c6370
# ────────────────────────────────────────────────────────────────────────────

[character]
success_symbol = "[❯](bold #98c379)"
error_symbol   = "[❯](bold #e06c75)"
vimcmd_symbol  = "[❮](bold #98c379)"

[directory]
style             = "bold #c678dd"    # purple
truncation_length = 3
truncate_to_repo  = true
read_only         = " "
read_only_style   = "bold #e06c75"
home_symbol       = "~"

[git_branch]
symbol = " "
style  = "bold #e06c75"              # pastel red (was hard #e31b1b)
format = "on [$symbol$branch]($style) "

[git_commit]
commit_hash_length = 7
style              = "bold #e5c07b"
tag_symbol         = "  "

[git_state]
style  = "bold #c678dd"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[git_status]
# Layout: [ ?3 !2 +1 »1 ✘1 $1 ⇡1⇣0 ]
format         = '([\[$all_status$ahead_behind\]]($style) )'
style          = "bold #e5c07b"      # yellow umbrella
conflicted     = "[=${count}](bold #e06c75) "
ahead          = "[⇡${count}](bold #98c379) "
behind         = "[⇣${count}](bold #e5c07b) "
diverged       = "[⇕⇡${ahead_count}⇣${behind_count}](bold #e06c75) "
up_to_date     = ""
untracked      = "[?${count}](bold #61afef) "
stashed        = "[\\$${count}](bold #86BBD8) "
modified       = "[!${count}](bold #e5c07b) "
staged         = "[+${count}](bold #98c379) "
renamed        = "[»${count}](bold #c678dd) "
deleted        = "[✘${count}](bold #e06c75) "

[cmd_duration]
min_time          = 2000
format            = "took [ $duration]($style) "
style             = "bold #5c6370"   # gray — less visual weight than before
show_milliseconds = false

[time]
disabled    = false
time_format = "%R"
format      = "[ $time ](bold #5c6370)"

# ─── Language / runtime badges ──────────────────────────────────────────────
# Only show when relevant files are present (default behavior).

[nodejs]
symbol         = " "
format         = "via [$symbol$version]($style) "
style          = "bold #98c379"
detect_files   = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[python]
symbol = " "
format = "via [$symbol$version( \\($virtualenv\\))]($style) "
style  = "bold #e5c07b"

[golang]
symbol = " "
format = "via [$symbol$version]($style) "
style  = "bold #86BBD8"

[rust]
symbol = " "
format = "via [$symbol$version]($style) "
style  = "bold #e06c75"

[java]
symbol = " "
format = "via [$symbol$version]($style) "
style  = "bold #61afef"

[docker_context]
symbol = " "
format = "via [$symbol$context]($style) "
style  = "bold #61afef"
only_with_files = true

[kubernetes]
disabled = false
symbol   = "󱃾 "
format   = "on [$symbol$context( \\($namespace\\))]($style) "
style    = "bold #c678dd"
# Only show on directories containing these (keeps prompt quiet outside k8s work)
detect_files    = ["kustomization.yml", "kustomization.yaml", "Chart.yaml"]
detect_folders  = [".kube"]

[package]
symbol   = " "
style    = "bold #e06c75"
disabled = true   # usually noise — enable per-project if you want it

[aws]
disabled = true

[lua]
disabled = true

[battery]
full_symbol        = "🔋"
charging_symbol    = "🔌"
discharging_symbol = "⚡"
[[battery.display]]
threshold = 20
style     = "bold #e06c75"
[[battery.display]]
threshold = 50
style     = "bold #e5c07b"
