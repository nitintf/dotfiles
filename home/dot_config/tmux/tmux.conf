# ~/.config/tmux/tmux.conf — sensible defaults + tpm

# --- base -------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 100000
set -sg escape-time 0
set -g focus-events on

# --- prefix: Ctrl+a (easier to reach than Ctrl+b) ---------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- splits use current pane path -------------------------------------------
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- vim-style pane navigation ----------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- reload config ----------------------------------------------------------
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# --- copy mode uses vi keys -------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# --- plugins via tpm (pulled by chezmoi external) ---------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Auto-restore on tmux start
set -g @continuum-restore 'on'

# Install tpm if missing (fallback — chezmoi external normally handles this)
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone --depth 1 https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm'"

# Initialize tpm (must be last line)
run '~/.config/tmux/plugins/tpm/tpm'
