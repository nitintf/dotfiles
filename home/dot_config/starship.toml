# Starship prompt — https://starship.rs/config/
# Layout: [dir] [git] [lang]  [duration] [cmd_status]
#                                           [char] (on its own line)

format = """
$directory\
$git_branch\
$git_status\
$git_state\
$nodejs\
$python\
$golang\
$rust\
$cmd_duration\
$line_break\
$character"""

add_newline = true

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

[directory]
style              = "bold cyan"
truncation_length  = 3
truncate_to_repo   = true
read_only          = " "

[git_branch]
symbol = " "
style  = "bold purple"

[git_status]
style               = "bold yellow"
conflicted          = "= "
ahead               = "⇡${count} "
behind              = "⇣${count} "
diverged            = "⇕⇡${ahead_count}⇣${behind_count} "
up_to_date          = ""
untracked           = "?${count} "
stashed             = " ${count} "
modified            = "!${count} "
staged              = "+${count} "
renamed             = "»${count} "
deleted             = "✘${count} "

[cmd_duration]
min_time       = 2000
format         = "took [$duration](bold yellow) "
show_milliseconds = false

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "bold green"

[python]
symbol = " "
format = "[$symbol($version )(\\($virtualenv\\) )]($style)"
style  = "bold yellow"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "bold cyan"

[rust]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "bold red"
